# Strategy config — single source of truth for the weekly job and the VM daily loop.
# Mirrors the knobs in src/config.py (Config dataclass). Plan ref: bot-implementaion-plan §2.

# --- horizon & labels (swing-bot-plan §1–2) ---
horizon: 5                 # swing horizon in trading days {3,5,10}
label_type: triple_barrier # triple_barrier | fwd_ret
barriers:
  up_mult: 2.0             # upper (take-profit) = close + up_mult*ATR
  dn_mult: 2.0             # lower (stop-loss)   = close - dn_mult*ATR

# --- decision / ranking ---
top_k: 10                  # trade the top-K names clearing the threshold
prob_threshold: 0.5        # min calibrated P(TP-first) to consider a LONG
n_quantile: 5
mode: long_only            # long_only | long_short (long-short needs F&O)
conviction_weighted_sizing: true  # size basket members by score-rank conviction, not equal weight (model-improvement-plan Phase 4.19)

# --- walk-forward validation (swing-bot-plan §7) ---
train_min_days: 504        # ~2y warmup before first prediction
embargo: 5                 # >= horizon, purge gap
n_wf_splits: 8
ensemble_size: 3           # multi-seed bagging per walk-forward step (model-improvement-plan Phase 3.16)

# --- costs (swing-bot-plan §10.3) — verify against current broker/exchange schedule ---
costs:
  stt: 0.001               # 0.1% buy + 0.1% sell (delivery)
  exch_txn: 0.0000297
  sebi_fee: 0.000001
  stamp: 0.00015           # 0.015% on buy
  gst: 0.18                # on (brokerage + exch_txn + sebi_fee)
  dp_charge: 13.0          # per scrip on sell
  cost_bps_per_side: 20.0  # ~40 bps round-trip incl. slippage

# --- risk caps (swing-bot-plan §14) ---
risk:
  max_positions: 10
  position_size_pct: 0.05  # 5% of portfolio per name
  initial_capital: 1000000 # INR
  regime_filter: true      # go flat when Nifty < 200-day SMA (caps drawdown)
  signal_stop_atr_mult: 1.5    # paper/live stop  = entry - 1.5*ATR
  signal_target_atr_mult: 3.0  # paper/live target = entry + 3.0*ATR (RR≈2:1)

# --- promotion gate (bot-implementaion-plan §8) ---
promotion:
  sharpe_margin: 0.10
  ic_margin: 0.005
  calib_tol: 0.10

# --- drift thresholds (bot-implementaion-plan §9) ---
drift:
  psi_retrain: 0.25
  psi_watch: 0.20

# --- registry housekeeping (bot-implementaion-plan §7) ---
registry:
  keep_bundles: 8          # retain last N for instant rollback

# --- dynamic horizon & RR (docs/dynamic-horizon-rr-plan.md) — OFF by default ---
# Flip enabled: true on Colab once Phase 0-6 ablations justify it. Leaving this
# whole block absent/false reproduces today's fixed-horizon/fixed-RR behaviour

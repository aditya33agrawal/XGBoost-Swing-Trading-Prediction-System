# Weekly retrain via GitHub Actions cron (bot-implementaion-plan §10).
# "Colab for development, Actions for the recurring job." Same code, same
# Drive/Supabase registry — nothing else changes. This is the robust, headless
# production path once live; until then trigger it manually with workflow_dispatch.
name: weekly-retrain

on:
  schedule:
    - cron: "30 3 * * 0"          # Sundays 03:30 UTC (~09:00 IST)
  workflow_dispatch:
    inputs:
      trials:
        description: "Optuna trials (0 = reuse last-good params)"
        default: "50"
      force_deploy:
        description: "Deploy regardless of the promotion gate"
        type: boolean
        default: false

concurrency:
  group: weekly-retrain
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Leakage + registry test gate
        run: pytest tests/ -q

      - name: Weekly retrain
        run: |
          python scripts/weekly_retrain.py \
            --trials ${{ github.event.inputs.trials || '50' }} \
            ${{ github.event.inputs.force_deploy == 'true' && '--force-deploy' || '' }}

      # Persist the registry, reports and outputs as a build artifact so there is
      # always an off-Colab copy of every bundle + drift report (plan §14).
      - name: Upload registry + reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registry-${{ github.run_number }}
          path: |
            registry/
            reports/
            outputs/
          if-no-files-found: ignore
          retention-days: 90
